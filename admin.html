<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin | Shopping Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f4f7fe; color: #1a1a1a; }
        .sidebar { background: #0f172a; color: white; height: 100vh; position: fixed; width: 280px; }
        .main-content { margin-left: 280px; padding: 40px; }
        .glass-card { background: white; border-radius: 30px; border: 1px solid rgba(0,0,0,0.03); box-shadow: 0 10px 40px rgba(0,0,0,0.02); }
        .input-field { background: #f8fafc; border: 2px solid transparent; border-radius: 15px; padding: 12px 15px; width: 100%; outline: none; transition: 0.3s; font-weight: 600; font-size: 14px; }
        .input-field:focus { border-color: #3b82f6; background: white; }
        .btn-primary { background: #1e40af; color: white; padding: 15px; border-radius: 15px; font-weight: 800; text-transform: uppercase; transition: 0.3s; width: 100%; cursor: pointer; border: none; }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(30, 64, 175, 0.2); }
        .product-row:hover { background: #f8fafc; }
        .badge { padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; text-transform: uppercase; background: #f1f5f9; color: #64748b; }
        .size-chip { padding: 4px 8px; background: #eff6ff; color: #1e40af; border-radius: 6px; font-size: 10px; font-weight: 800; margin-right: 4px; display: inline-block; }
    </style>
</head>
<body>

    <div class="sidebar p-8">
        <div class="flex items-center space-x-3 mb-12">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg"><i class="fa-solid fa-shield-halved text-white"></i></div>
            <span class="text-xl font-black tracking-tighter uppercase">Admin Hub</span>
        </div>
        <nav class="space-y-4">
            <a href="admin.html" class="flex items-center space-x-4 p-4 bg-blue-600 rounded-2xl text-white font-bold shadow-lg shadow-blue-900/20"><i class="fa-solid fa-plus-circle"></i><span>Inventory</span></a>
            <a href="admin-orders.html" class="flex items-center space-x-4 p-4 hover:bg-white/5 rounded-2xl text-gray-400 hover:text-white transition"><i class="fa-solid fa-truck-ramp-box"></i><span>Customer Orders</span></a>
            <a href="index.html" class="flex items-center space-x-4 p-4 hover:bg-white/5 rounded-2xl text-gray-400 hover:text-white transition"><i class="fa-solid fa-eye"></i><span>View Website</span></a>
        </nav>
    </div>

    <div class="main-content">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tighter uppercase">Inventory Management</h1>
                <p class="text-slate-400 font-bold text-xs mt-1 uppercase tracking-widest">Manage Discounted Prices & Sizes</p>
            </div>
            <a href="admin-orders.html" class="bg-black text-white px-6 py-3 rounded-2xl font-black text-[10px] tracking-widest flex items-center gap-3">VIEW RECENT ORDERS <i class="fa-solid fa-arrow-right"></i></a>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            
            <div class="lg:col-span-4">
                <div class="glass-card p-8 sticky top-10">
                    <h2 class="text-xl font-black mb-6 flex items-center gap-3"><i class="fa-solid fa-cloud-arrow-up text-blue-600"></i> Upload Product</h2>
                    <form id="productForm" class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="col-span-2">
                                <label class="text-[10px] font-black uppercase text-gray-400 ml-1">Product Name</label>
                                <input type="text" id="pName" class="input-field mt-1" placeholder="e.g. Nike T-Shirt" required>
                            </div>
                            <div class="col-span-2">
                                <label class="text-[10px] font-black uppercase text-gray-400 ml-1">Category</label>
                                <select id="pCat" class="input-field mt-1 cursor-pointer">
                                    <option value="Fashion">Fashion</option>
                                    <option value="Electronics">Electronics</option>
                                    <option value="Kitchen">Kitchen</option>
                                    <option value="Home Decor">Home Decor</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] font-black uppercase text-gray-400 ml-1">Selling Price (₹)</label>
                                <input type="number" id="pPrice" class="input-field mt-1 border-2 border-blue-100" placeholder="500" required>
                            </div>
                            <div>
                                <label class="text-[10px] font-black uppercase text-gray-400 ml-1 text-red-400">Old Price (₹)</label>
                                <input type="number" id="pOldPrice" class="input-field mt-1" placeholder="999">
                            </div>
                        </div>

                        <div>
                            <label class="text-[10px] font-black uppercase text-gray-400 ml-1">Available Sizes (S, M, L...)</label>
                            <input type="text" id="pSizes" class="input-field mt-1" placeholder="Separate with commas">
                        </div>

                        <div>
                            <label class="text-[10px] font-black uppercase text-gray-400 ml-1">Description</label>
                            <textarea id="pDesc" rows="3" class="input-field mt-1" placeholder="Describe your product..."></textarea>
                        </div>

                        <div>
                            <label class="text-[10px] font-black uppercase text-gray-400 ml-1">Image URL</label>
                            <input type="url" id="pImg" class="input-field mt-1" placeholder="https://image-link.com" required>
                        </div>

                        <button type="submit" class="btn-primary mt-4">Save Product <i class="fa-solid fa-check-double ml-2"></i></button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="glass-card p-8 min-h-[600px]">
                    <div class="flex justify-between items-center mb-8">
                        <h2 class="text-xl font-black">Live Inventory</h2>
                        <span id="prodCount" class="bg-blue-100 text-blue-800 text-[10px] font-black px-4 py-1 rounded-full uppercase">0 Items Loading...</span>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-[10px] font-black uppercase text-gray-400 border-b border-gray-100">
                                    <th class="pb-4 px-2">Preview</th>
                                    <th class="pb-4">Details</th>
                                    <th class="pb-4">Sizes</th>
                                    <th class="pb-4">Pricing</th>
                                    <th class="pb-4 text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="inventoryList"></tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDfTmfa-rjdOOKaKfkiZm5re7F4deVDGf4",
            authDomain: "shopping-hub-32e5d.firebaseapp.com",
            projectId: "shopping-hub-32e5d",
            storageBucket: "shopping-hub-32e5d.firebasestorage.app",
            messagingSenderId: "905516678846",
            appId: "1:905516678846:web:602146999a96f6a79928ef"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "Processing..."; btn.disabled = true;

            const sizesArray = document.getElementById('pSizes').value.split(',').map(s => s.trim()).filter(s => s !== "");

            const newProduct = {
                name: document.getElementById('pName').value,
                category: document.getElementById('pCat').value,
                price: document.getElementById('pPrice').value,
                oldPrice: document.getElementById('pOldPrice').value || "", // ਡਿਸਕਾਊਂਟ ਪ੍ਰਾਈਸ
                description: document.getElementById('pDesc').value,
                sizes: sizesArray,
                image: document.getElementById('pImg').value,
                timestamp: serverTimestamp()
            };

            try {
                await addDoc(collection(db, "products"), newProduct);
                document.getElementById('productForm').reset();
                alert("Product Added Successfully!");
            } catch (err) { alert(err.message); }
            btn.innerText = "Save Product"; btn.disabled = false;
        });

        function loadInventory() {
            const list = document.getElementById('inventoryList');
            const q = query(collection(db, "products"), orderBy("timestamp", "desc"));

            onSnapshot(q, (snapshot) => {
                list.innerHTML = "";
                document.getElementById('prodCount').innerText = `${snapshot.size} LIVE PRODUCTS`;
                snapshot.forEach(productDoc => {
                    const p = productDoc.data();
                    const id = productDoc.id;
                    const sizesHTML = p.sizes ? p.sizes.map(s => `<span class="size-chip">${s}</span>`).join('') : '--';

                    list.innerHTML += `
                        <tr class="product-row border-b border-gray-50">
                            <td class="py-5 px-2"><img src="${p.image}" class="w-14 h-14 rounded-2xl object-cover shadow-sm border border-gray-100"></td>
                            <td class="py-5 max-w-[200px]">
                                <p class="text-sm font-black text-slate-800 line-clamp-1">${p.name}</p>
                                <span class="badge mt-2 inline-block">${p.category}</span>
                            </td>
                            <td class="py-5">${sizesHTML}</td>
                            <td class="py-5">
                                <div class="flex flex-col">
                                    <span class="text-sm font-black text-blue-900">₹${p.price}</span>
                                    ${p.oldPrice ? `<span class="text-[10px] text-gray-400 line-through">₹${p.oldPrice}</span>` : ''}
                                </div>
                            </td>
                            <td class="py-5 text-right">
                                <button onclick="deleteProduct('${id}')" class="bg-red-50 text-red-500 hover:bg-red-500 hover:text-white transition w-10 h-10 rounded-xl"><i class="fa-solid fa-trash-can"></i></button>
                            </td>
                        </tr>`;
                });
            });
        }

        window.deleteProduct = async (id) => { if(confirm("Remove this product?")) { await deleteDoc(doc(db, "products", id)); } }
        loadInventory();
    </script>
</body>
</html>
