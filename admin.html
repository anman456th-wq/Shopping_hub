<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Hub | Full Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; padding: 20px; }
        .section { max-width: 800px; margin: 20px auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { color: #1e40af; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
        .btn { background: #1e40af; color: white; padding: 15px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; }
        
        /* Order Card */
        .order-card { background: #fffbeb; border: 1px solid #fde68a; padding: 15px; border-radius: 10px; margin-bottom: 15px; position: relative; }
        
        /* Product Item */
        .product-item { display: flex; align-items: center; background: #f8fafc; padding: 10px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #e2e8f0; }
        .product-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; margin-right: 15px; }
        .product-info { flex-grow: 1; }
        
        .del-btn { background: #ef4444; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .del-btn:hover { background: #dc2626; }
        .badge { background: #1e40af; color: white; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
    </style>
</head>
<body>

<div class="section">
    <h2>➕ Add New Product</h2>
    <input type="text" id="pName" placeholder="Product Name">
    <input type="text" id="pCat" placeholder="Category (e.g. Shoes, Shirts)">
    <input type="number" id="pPrice" placeholder="Price (₹)">
    <input type="text" id="pImg" placeholder="Image URL">
    <textarea id="pDesc" placeholder="Product Description..."></textarea>
    <button class="btn" onclick="saveProduct()">Upload to Website</button>
</div>

<div class="section">
    <h2>📦 Customer Orders (Total: <span id="orderCount">0</span>)</h2>
    <div id="order-list">Loading orders...</div>
</div>

<div class="section">
    <h2>🛠️ Manage Products</h2>
    <div id="admin-product-list">Loading products...</div>
</div>

<script type="import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const auth = getAuth(app);

// ਇਹ ਚੈੱਕ ਕਰੇਗਾ ਕਿ ਕੀ ਤੁਸੀਂ ਲੋਗਿਨ ਹੋ
onAuthStateChanged(auth, (user) => {
    if (!user) {
        // ਜੇ ਲੋਗਿਨ ਨਹੀਂ ਹੈ, ਤਾਂ ਵਾਪਸ ਲੋਗਿਨ ਪੇਜ 'ਤੇ ਭੇਜ ਦਿਓ
        window.location.href = "login.html";
    }
});">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDfTmfa-rjdOOKaKfkiZm5re7F4deVDGf4",
        authDomain: "shopping-hub-32e5d.firebaseapp.com",
        projectId: "shopping-hub-32e5d",
        storageBucket: "shopping-hub-32e5d.firebasestorage.app",
        messagingSenderId: "905516678846",
        appId: "1:905516678846:web:602146999a96f6a79928ef"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // SAVE PRODUCT
    window.saveProduct = async () => {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const img = document.getElementById('pImg').value;
        if(!name || !price || !img) { alert("Fill Name, Price & Image!"); return; }

        await addDoc(collection(db, "products"), {
            name, price, image: img, category: document.getElementById('pCat').value || "General",
            desc: document.getElementById('pDesc').value || "", timestamp: new Date()
        });
        alert("Product Added!");
        location.reload();
    }

    // SHOW ORDERS
    onSnapshot(query(collection(db, "orders"), orderBy("time", "desc")), (snap) => {
        const oList = document.getElementById('order-list');
        document.getElementById('orderCount').innerText = snap.size;
        oList.innerHTML = snap.size === 0 ? "No orders yet." : "";
        snap.forEach((oDoc) => {
            const o = oDoc.data();
            oList.innerHTML += `
                <div class="order-card">
                    <button class="del-btn" style="float:right" onclick="deleteItem('orders', '${oDoc.id}')">Delete Order</button>
                    <div class="badge">NEW ORDER</div>
                    <p><b>Product:</b> ${o.product}</p>
                    <p><b>Customer:</b> ${o.customer} (${o.phone})</p>
                    <p><b>Address:</b> ${o.address}</p>
                </div>`;
        });
    });

    // SHOW PRODUCTS FOR MANAGEMENT
    onSnapshot(query(collection(db, "products"), orderBy("timestamp", "desc")), (snap) => {
        const pList = document.getElementById('admin-product-list');
        pList.innerHTML = "";
        snap.forEach((pDoc) => {
            const p = pDoc.data();
            pList.innerHTML += `
                <div class="product-item">
                    <img src="${p.image}">
                    <div class="product-info">
                        <b>${p.name}</b><br>
                        <small>₹${p.price} | ${p.category}</small>
                    </div>
                    <button class="del-btn" onclick="deleteItem('products', '${pDoc.id}')">Remove</button>
                </div>`;
        });
    });

    // GENERIC DELETE FUNCTION
    window.deleteItem = async (folder, id) => {
        if(confirm("Are you sure?")) {
            await deleteDoc(doc(db, folder, id));
        }
    }
</script>
</body>
</html>
