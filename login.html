<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Access | Online Shopping Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #fdfbf7; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .auth-card {
            background: #ffffff;
            border-radius: 40px;
            padding: 50px 40px;
            box-shadow: 0 40px 100px rgba(30, 64, 175, 0.08);
            width: 100%;
            max-width: 450px;
            transition: 0.5s all ease-in-out;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .custom-input {
            width: 100%;
            padding: 16px 16px 16px 50px;
            background: #f8fafc;
            border: 2px solid transparent;
            border-radius: 15px;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
            outline: none;
        }

        .custom-input:focus {
            border-color: #1e40af;
            background: #fff;
        }

        .input-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .action-btn {
            width: 100%;
            background: #1e40af;
            color: white;
            padding: 18px;
            border-radius: 15px;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(30, 64, 175, 0.2);
            transition: 0.3s;
        }

        .action-btn:hover { transform: translateY(-3px); background: #1e3a8a; }

        #successOverlay {
            position: fixed;
            inset: 0;
            background: #1e40af;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            color: white;
        }

        .toggle-text {
            cursor: pointer;
            color: #1e40af;
            font-weight: 800;
        }

        .hidden-form { display: none; }
    </style>
</head>
<body>

    <div id="successOverlay">
        <i class="fa-solid fa-circle-check text-7xl mb-4 animate__animated animate__bounceIn"></i>
        <h2 id="successMessage" class="text-3xl font-black uppercase tracking-tighter">Welcome Back!</h2>
        <p class="text-blue-200 text-xs font-bold mt-2 uppercase tracking-widest">Entering Shopping Hub...</p>
    </div>

    <div class="auth-card mx-4 animate__animated animate__fadeIn">
        
        <div class="text-center mb-10">
            <div class="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-bolt-lightning text-2xl text-blue-800"></i>
            </div>
            <h1 id="formTitle" class="text-3xl font-black text-slate-900 tracking-tighter">Login</h1>
            <p id="formSubTitle" class="text-slate-400 text-xs font-bold uppercase tracking-wider mt-1">Access your premium account</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <i class="fa-solid fa-envelope input-icon"></i>
                <input type="email" id="loginEmail" class="custom-input" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock input-icon"></i>
                <input type="password" id="loginPass" class="custom-input" placeholder="Password" required>
            </div>
            <button type="submit" class="action-btn">Sign In <i class="fa-solid fa-arrow-right ml-2"></i></button>
        </form>

        <form id="signupForm" class="hidden-form">
            <div class="input-group">
                <i class="fa-solid fa-user input-icon"></i>
                <input type="text" id="signupName" class="custom-input" placeholder="Full Name" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-envelope input-icon"></i>
                <input type="email" id="signupEmail" class="custom-input" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock input-icon"></i>
                <input type="password" id="signupPass" class="custom-input" placeholder="Create Password" required>
            </div>
            <button type="submit" class="action-btn">Create Account <i class="fa-solid fa-user-plus ml-2"></i></button>
        </form>

        <div class="mt-8 text-center">
            <p id="toggleDesc" class="text-xs font-bold text-slate-400 uppercase tracking-widest">
                Don't have an account? <span onclick="toggleAuth()" class="toggle-text">Create One</span>
            </p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDfTmfa-rjdOOKaKfkiZm5re7F4deVDGf4",
            authDomain: "shopping-hub-32e5d.firebaseapp.com",
            projectId: "shopping-hub-32e5d",
            storageBucket: "shopping-hub-32e5d.firebasestorage.app",
            messagingSenderId: "905516678846",
            appId: "1:905516678846:web:602146999a96f6a79928ef"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // --- Toggle Logic ---
        let isLogin = true;
        window.toggleAuth = function() {
            isLogin = !isLogin;
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const title = document.getElementById('formTitle');
            const subTitle = document.getElementById('formSubTitle');
            const desc = document.getElementById('toggleDesc');

            if(isLogin) {
                loginForm.classList.remove('hidden-form');
                signupForm.classList.add('hidden-form');
                title.innerText = "Login";
                subTitle.innerText = "Access your premium account";
                desc.innerHTML = `Don't have an account? <span onclick="toggleAuth()" class="toggle-text">Create One</span>`;
            } else {
                loginForm.classList.add('hidden-form');
                signupForm.classList.remove('hidden-form');
                title.innerText = "Join Us";
                subTitle.innerText = "Start your shopping journey";
                desc.innerHTML = `Already a member? <span onclick="toggleAuth()" class="toggle-text">Login Here</span>`;
            }
        }

        // --- Login Action ---
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                showSuccess("Success! Welcome Back");
            } catch (err) { alert(err.message); }
        });

        // --- Signup Action ---
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const pass = document.getElementById('signupPass').value;
            try {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await updateProfile(res.user, { displayName: name });
                showSuccess("Account Created Successfully!");
            } catch (err) { alert(err.message); }
        });

        function showSuccess(msg) {
            document.getElementById('successMessage').innerText = msg;
            document.getElementById('successOverlay').style.display = 'flex';
            setTimeout(() => { window.location.href = "index.html"; }, 2000);
        }
    </script>
</body>
</html>
