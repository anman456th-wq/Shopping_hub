<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Shopping Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        h2 { color: #1e40af; margin-bottom: 10px; }
        p { color: #64748b; font-size: 14px; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #1e40af; }
        button { width: 100%; padding: 12px; background: #1e40af; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #1e3a8a; }
        #msg { color: red; font-size: 13px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Admin Login</h2>
    <p>ਸਿਰਫ਼ ਐਡਮਿਨ ਲਈ (Only for Admin)</p>
    
    <input type="email" id="email" placeholder="Admin Email (ਈਮੇਲ)">
    <input type="password" id="pass" placeholder="Password (ਪਾਸਵਰਡ)">
    
    <button onclick="login()">Login to Dashboard</button>
    
    <div id="msg">ਗਲਤ ਈਮੇਲ ਜਾਂ ਪਾਸਵਰਡ!</div>
</div>

<script type="module">
    // Firebase Libraries ਜੋੜਨਾ
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // ਤੁਹਾਡਾ Firebase Config (ਇਹ ਬਿਲਕੁਲ ਸਹੀ ਹੋਣਾ ਚਾਹੀਦਾ ਹੈ)
    const firebaseConfig = {
        apiKey: "AIzaSyDfTmfa-rjdOOKaKfkiZm5re7F4deVDGf4",
        authDomain: "shopping-hub-32e5d.firebaseapp.com",
        projectId: "shopping-hub-32e5d",
        storageBucket: "shopping-hub-32e5d.firebasestorage.app",
        messagingSenderId: "905516678846",
        appId: "1:905516678846:web:602146999a96f6a79928ef"
    };

    // Firebase ਨੂੰ ਚਾਲੂ ਕਰਨਾ
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // ਲੋਗਿਨ ਫੰਕਸ਼ਨ
    window.login = function() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const errorMsg = document.getElementById('msg');

        // ਜੇਕਰ ਖਾਨੇ ਖਾਲੀ ਹਨ
        if(!email || !pass) {
            alert("ਕਿਰਪਾ ਕਰਕੇ ਈਮੇਲ ਅਤੇ ਪਾਸਵਰਡ ਭਰੋ!");
            return;
        }

        // Firebase ਨਾਲ ਚੈੱਕ ਕਰਨਾ
        signInWithEmailAndPassword(auth, email, pass)
            .then((userCredential) => {
                // ਜੇਕਰ ਸਹੀ ਹੈ
                console.log("Login Success!");
                window.location.href = "admin.html"; // ਇਹ ਤੁਹਾਨੂੰ ਐਡਮਿਨ ਪੇਜ 'ਤੇ ਲੈ ਜਾਵੇਗਾ
            })
            .catch((error) => {
                // ਜੇਕਰ ਗਲਤ ਹੈ
                console.error("Error:", error.message);
                errorMsg.style.display = "block";
                alert("ਗਲਤੀ: " + error.message);
            });
    }
</script>

</body>
</html>
