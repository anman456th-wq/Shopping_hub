<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Orders</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; margin: 0; padding: 20px; }
        .nav-bar { background: #1e40af; padding: 15px; border-radius: 10px; margin-bottom: 25px; display: flex; gap: 15px; justify-content: center; }
        .nav-bar a { color: white; text-decoration: none; font-weight: 600; font-size: 14px; }
        .order-card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 15px; border-left: 5px solid #1e40af; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .order-card h4 { margin: 0; color: #1e40af; font-size: 18px; }
        .order-card p { margin: 8px 0; font-size: 14px; color: #475569; border-bottom: 1px solid #f1f5f9; padding-bottom: 5px; }
        .del-btn { color: #ef4444; cursor: pointer; border: none; background: none; font-weight: 600; margin-top: 10px; }
    </style>
</head>
<body>

<div class="nav-bar">
    <a href="admin.html">Add Product</a>
    <a href="product-list.html">View Products</a>
    <a href="orders.html">View Orders</a>
</div>

<h2 style="text-align: center;">New Orders</h2>
<div id="orders-container">Loading orders...</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDfTmfa-rjdOOKaKfkiZm5re7F4deVDGf4",
        authDomain: "shopping-hub-32e5d.firebaseapp.com",
        projectId: "shopping-hub-32e5d",
        appId: "1:905516678846:web:602146999a96f6a79928ef"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    onSnapshot(query(collection(db, "orders"), orderBy("timestamp", "desc")), (snapshot) => {
        const container = document.getElementById('orders-container');
        container.innerHTML = "";
        if(snapshot.empty) container.innerHTML = "No orders received yet.";
        snapshot.forEach((docSnap) => {
            const ord = docSnap.data();
            container.innerHTML += `
                <div class="order-card">
                    <h4>Customer: ${ord.customer || ord.name}</h4>
                    <p><b>Phone:</b> ${ord.phone}</p>
                    <p><b>Product:</b> ${ord.product}</p>
                    <p><b>Address:</b> ${ord.address}</p>
                    <button class="del-btn" onclick="deleteOrder('${docSnap.id}')">Delete Order</button>
                </div>`;
        });
    });

    window.deleteOrder = async (id) => {
        if(confirm("Delete this order?")) await deleteDoc(doc(db, "orders", id));
    };
</script>
</body>
</html>
