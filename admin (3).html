<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Add Product</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; margin: 0; padding: 20px; }
        .nav-bar { background: #1e40af; padding: 15px; border-radius: 10px; margin-bottom: 25px; display: flex; gap: 15px; justify-content: center; overflow-x: auto; }
        .nav-bar a { color: white; text-decoration: none; font-weight: 600; font-size: 14px; white-space: nowrap; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); max-width: 500px; margin: auto; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        .btn { background: #1e40af; color: white; border: none; padding: 14px; border-radius: 8px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #1e3a8a; }
    </style>
</head>
<body>

<div class="nav-bar">
    <a href="admin.html">Add Product</a>
    <a href="product-list.html">View Products</a>
    <a href="orders.html">View Orders</a>
</div>

<div class="card">
    <h2 style="text-align:center; color:#1e40af;">Add New Product</h2>
    <input type="text" id="pName" placeholder="Product Title">
    <input type="number" id="pPrice" placeholder="Price (INR)">
    <input type="text" id="pImage" placeholder="Image URL Link">
    <textarea id="pDesc" rows="4" placeholder="Product Description (Details about material, size, etc.)"></textarea>
    <button class="btn" onclick="uploadProduct()">Save Product</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyDfTmfa-rjdOOKaKfkiZm5re7F4deVDGf4",
        authDomain: "shopping-hub-32e5d.firebaseapp.com",
        projectId: "shopping-hub-32e5d",
        storageBucket: "shopping-hub-32e5d.firebasestorage.app",
        messagingSenderId: "905516678846",
        appId: "1:905516678846:web:602146999a96f6a79928ef"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.uploadProduct = async () => {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const image = document.getElementById('pImage').value;
        const desc = document.getElementById('pDesc').value;

        if(!name || !price || !image || !desc) return alert("Please fill all fields, including description!");

        try {
            await addDoc(collection(db, "products"), {
                name, price, image, desc, timestamp: serverTimestamp()
            });
            alert("Product Uploaded Successfully!");
            location.reload();
        } catch(e) { alert("Error: " + e.message); }
    };
</script>
</body>
</html>
