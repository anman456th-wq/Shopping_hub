<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Support | Shopping Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #fdfbf7; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            background: #1e40af;
            color: white;
            padding: 20px;
            border-radius: 0 0 30px 30px;
            box-shadow: 0 10px 30px rgba(30, 64, 175, 0.2);
        }

        #chatContainer {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 80%;
            margin-bottom: 15px;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.5;
            position: relative;
        }

        .user-message {
            background: #1e40af;
            color: white;
            align-self: flex-end;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }

        .admin-message {
            background: #ffffff;
            color: #1a1a1a;
            border: 1px solid #eee;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .auto-reply {
            background: #f0fdf4;
            color: #15803d;
            border: 1px solid #bbf7d0;
            font-weight: 600;
            text-align: center;
            margin: 20px auto;
            max-width: 90%;
            border-radius: 12px;
            font-size: 12px;
        }

        .input-area {
            background: white;
            padding: 20px;
            border-top: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-input {
            flex: 1;
            background: #f9f9f9;
            border: 1px solid #eee;
            padding: 15px 20px;
            border-radius: 100px;
            outline: none;
            font-size: 14px;
        }

        .send-btn {
            background: #1e40af;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <div class="chat-header">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div class="flex items-center space-x-4">
                <a href="my-orders.html" class="text-white/80 hover:text-white">
                    <i class="fa-solid fa-chevron-left"></i>
                </a>
                <div>
                    <h1 class="text-lg font-black tracking-tight">Support Center</h1>
                    <p class="text-[10px] uppercase tracking-widest text-blue-200 font-bold">Online Support Team</p>
                </div>
            </div>
            <div class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center">
                <i class="fa-solid fa-headset"></i>
            </div>
        </div>
    </div>

    <div id="chatContainer" class="max-w-4xl mx-auto w-full flex flex-col">
        </div>

    <div class="input-area">
        <div class="max-w-4xl mx-auto w-full flex items-center gap-3">
            <input type="text" id="messageInput" class="chat-input" placeholder="Type your message here...">
            <button id="sendBtn" class="send-btn">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDfTmfa-rjdOOKaKfkiZm5re7F4deVDGf4",
            authDomain: "shopping-hub-32e5d.firebaseapp.com",
            projectId: "shopping-hub-32e5d",
            storageBucket: "shopping-hub-32e5d.firebasestorage.app",
            messagingSenderId: "905516678846",
            appId: "1:905516678846:web:602146999a96f6a79928ef"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        const chatContainer = document.getElementById('chatContainer');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                loadMessages();
            } else {
                window.location.href = "login.html";
            }
        });

        async function sendMessage() {
            const text = document.getElementById('messageInput').value;
            if (!text.trim()) return;

            const messageData = {
                senderId: currentUser.uid,
                senderEmail: currentUser.email,
                text: text,
                timestamp: serverTimestamp(),
                isAdmin: false
            };

            document.getElementById('messageInput').value = '';

            await addDoc(collection(db, "chats"), messageData);

            // Auto Reply Message
            setTimeout(async () => {
                const autoReply = {
                    senderId: "system",
                    text: "Thank you for contacting us. Our team will help you within 3 hours. Please stay tuned.",
                    timestamp: serverTimestamp(),
                    isAdmin: true,
                    receiverId: currentUser.uid
                };
                // We don't necessarily need to save auto-replies to DB every time, 
                // but for this flow, it's better to show it in the UI.
                appendMessage(autoReply.text, true);
            }, 1000);
        }

        function loadMessages() {
            const q = query(
                collection(db, "chats"),
                where("senderEmail", "==", currentUser.email),
                orderBy("timestamp", "asc")
            );

            onSnapshot(q, (snapshot) => {
                chatContainer.innerHTML = '';
                snapshot.forEach((doc) => {
                    const msg = doc.data();
                    appendMessage(msg.text, msg.isAdmin);
                });
            });
        }

        function appendMessage(text, isAdmin) {
            const div = document.createElement('div');
            div.className = `message ${isAdmin ? 'admin-message' : 'user-message'}`;
            div.innerText = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
