<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | Shopping Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #fdfbf7; 
            color: #1a1a1a;
        }

        .checkout-container {
            max-width: 650px;
            margin: 40px auto;
            background: #ffffff;
            border-radius: 28px;
            padding: 40px;
            border: 1px solid rgba(0,0,0,0.02);
            box-shadow: 0 25px 50px rgba(0,0,0,0.03);
        }

        .header-blue {
            color: #1e40af;
            font-weight: 900;
        }

        .input-group {
            position: relative;
            margin-bottom: 24px;
        }

        .input-field {
            width: 100%;
            background: #ffffff;
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 12px;
            font-size: 14px;
            transition: 0.3s;
            outline: none;
        }

        .input-field:focus {
            border-color: #1e40af;
            box-shadow: 0 0 0 4px rgba(30, 64, 175, 0.05);
        }

        .float-label {
            position: absolute;
            top: 0;
            left: 0;
            padding: 20px;
            pointer-events: none;
            color: #999;
            font-size: 14px;
            transition: 0.3s;
        }

        .input-field:focus ~ .float-label,
        .input-field:not(:placeholder-shown) ~ .float-label {
            transform: translateY(-20px) scale(0.85);
            background: #ffffff;
            color: #1e40af;
            padding: 0px 8px;
            left: 12px;
            font-weight: bold;
        }

        /* Cash on Delivery Box Styling */
        .cod-box {
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff;
            margin-bottom: 24px;
        }

        .blue-dot-outer {
            width: 22px;
            height: 22px;
            border: 2px solid #1e40af;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .blue-dot-inner {
            width: 10px;
            height: 10px;
            background: #1e40af;
            border-radius: 50%;
        }

        .confirm-order-btn {
            width: 100%;
            background: #1e40af;
            color: white;
            padding: 20px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s;
            box-shadow: 0 10px 20px rgba(30, 64, 175, 0.2);
        }

        .confirm-order-btn:hover {
            background: #1e3a8a;
            transform: translateY(-2px);
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="orderOverlay" class="overlay">
        <i class="fa-solid fa-circle-notch animate-spin text-5xl text-blue-800 mb-6"></i>
        <h2 class="text-xl font-bold text-gray-900">Confirming Your Order...</h2>
    </div>

    <div class="px-4">
        <div class="checkout-container">
            <div class="flex items-center space-x-3 mb-10 pb-6 border-b border-gray-100">
                <a href="index.html" class="w-10 h-10 border border-gray-100 rounded-full flex items-center justify-center">
                    <i class="fa-solid fa-arrow-left text-sm text-blue-600"></i>
                </a>
                <h1 class="text-2xl header-blue tracking-tighter uppercase">Delivery Address</h1>
            </div>

            <form id="checkoutForm">
                
                <div class="input-group">
                    <input type="text" id="fullName" class="input-field" placeholder=" " required>
                    <label class="float-label">Full Name *</label>
                </div>

                <div class="input-group">
                    <input type="tel" id="mobile" class="input-field" placeholder=" " pattern="[0-9]{10}" maxlength="10" required>
                    <label class="float-label">Mobile Number *</label>
                </div>

                <div class="input-group">
                    <input type="text" id="house" class="input-field" placeholder=" " required>
                    <label class="float-label">House no./ Building Name *</label>
                </div>

                <div class="input-group">
                    <input type="text" id="area" class="input-field" placeholder=" " required>
                    <label class="float-label">Road Name / Area / Colony *</label>
                </div>

                <div class="input-group">
                    <input type="number" id="pincode" class="input-field" placeholder=" " required>
                    <label class="float-label">Pincode *</label>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="input-group">
                        <input type="text" id="city" class="input-field" placeholder=" " required>
                        <label class="float-label">City *</label>
                    </div>
                    <div class="input-group">
                        <input type="text" id="state" class="input-field" placeholder=" " required>
                        <label class="float-label">State *</label>
                    </div>
                </div>

                <div class="cod-box">
                    <div class="flex items-center space-x-4">
                        <i class="fa-solid fa-money-bill-wave text-gray-700 text-xl"></i>
                        <span class="font-bold text-gray-900 uppercase tracking-tight">Cash on Delivery</span>
                    </div>
                    <div class="blue-dot-outer">
                        <div class="blue-dot-inner"></div>
                    </div>
                </div>

                <div class="bg-blue-50 p-5 rounded-xl flex items-center mb-10 border border-blue-100">
                    <i class="fa-solid fa-clock-rotate-left text-blue-700 text-xl mr-4"></i>
                    <div>
                        <p class="text-[11px] font-black text-blue-900 uppercase">Estimated Delivery</p>
                        <p class="text-[10px] text-blue-600 font-bold">5 to 10 working days.</p>
                    </div>
                </div>

                <button type="submit" class="confirm-order-btn">
                    Confirm Order
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDfTmfa-rjdOOKaKfkiZm5re7F4deVDGf4",
            authDomain: "shopping-hub-32e5d.firebaseapp.com",
            projectId: "shopping-hub-32e5d",
            storageBucket: "shopping-hub-32e5d.firebasestorage.app",
            messagingSenderId: "905516678846",
            appId: "1:905516678846:web:602146999a96f6a79928ef"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let productData = null;

        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                if(productId) {
                    const docSnap = await getDoc(doc(db, "products", productId));
                    if(docSnap.exists()) productData = docSnap.data();
                }
            }
        });

        document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            document.getElementById('orderOverlay').style.display = 'flex';

            const orderPayload = {
                userEmail: currentUser.email,
                customerName: document.getElementById('fullName').value,
                phone: document.getElementById('mobile').value,
                houseNo: document.getElementById('house').value,
                roadArea: document.getElementById('area').value,
                pincode: document.getElementById('pincode').value,
                city: document.getElementById('city').value,
                state: document.getElementById('state').value,
                productName: productData ? productData.name : "Product",
                price: productData ? productData.price : "0",
                image: productData ? productData.image : "",
                paymentMethod: "Cash on Delivery",
                status: "Pending",
                orderDate: serverTimestamp()
            };

            try {
                await addDoc(collection(db, "orders"), orderPayload);
                setTimeout(() => {
                    window.location.href = "my-orders.html";
                }, 1500);
            } catch (err) {
                alert("Error: " + err.message);
                document.getElementById('orderOverlay').style.display = 'none';
            }
        });
    </script>
</body>
</html>
