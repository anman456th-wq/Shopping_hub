<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; margin: 0; padding: 20px; }
        .nav-bar { background: #1e40af; padding: 15px; border-radius: 10px; margin-bottom: 25px; display: flex; gap: 15px; justify-content: center; }
        .nav-bar a { color: white; text-decoration: none; font-weight: 600; font-size: 14px; }
        .product-item { background: white; padding: 20px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .product-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .product-header img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
        .desc-text { font-size: 13px; color: #64748b; background: #f1f5f9; padding: 10px; border-radius: 8px; margin-top: 10px; }
        .del-btn { color: #ef4444; border: none; background: none; cursor: pointer; font-weight: 600; font-size: 14px; }
    </style>
</head>
<body>

<div class="nav-bar">
    <a href="admin.html">Add Product</a>
    <a href="product-list.html">View Products</a>
    <a href="orders.html">View Orders</a>
</div>

<h2 style="text-align: center;">Inventory List</h2>
<div id="product-container">Loading products...</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDfTmfa-rjdOOKaKfkiZm5re7F4deVDGf4",
        authDomain: "shopping-hub-32e5d.firebaseapp.com",
        projectId: "shopping-hub-32e5d",
        appId: "1:905516678846:web:602146999a96f6a79928ef"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    onSnapshot(query(collection(db, "products"), orderBy("timestamp", "desc")), (snapshot) => {
        const container = document.getElementById('product-container');
        container.innerHTML = "";
        if(snapshot.empty) container.innerHTML = "No products found.";
        snapshot.forEach((docSnap) => {
            const p = docSnap.data();
            container.innerHTML += `
                <div class="product-item">
                    <div class="product-header">
                        <div style="display:flex; align-items:center; gap:15px;">
                            <img src="${p.image}">
                            <div><b>${p.name}</b><br><span style="color:#1e40af; font-weight:600;">₹${p.price}</span></div>
                        </div>
                        <button class="del-btn" onclick="deleteProduct('${docSnap.id}')">Delete</button>
                    </div>
                    <div class="desc-text"><b>Description:</b> ${p.desc || 'No description provided'}</div>
                </div>`;
        });
    });

    window.deleteProduct = async (id) => {
        if(confirm("Remove this product?")) await deleteDoc(doc(db, "products", id));
    };
</script>
</body>
</html>
