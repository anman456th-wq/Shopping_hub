<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Order Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f4f7fe; 
            color: #1a1a1a;
        }

        .admin-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid #eef2f6;
            overflow: hidden;
            transition: 0.3s;
        }

        .status-select {
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            border: 1px solid #ddd;
            outline: none;
        }

        .copy-btn {
            background: #f1f5f9;
            color: #1e40af;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 800;
            cursor: pointer;
        }

        .copy-btn:active { background: #e2e8f0; }

        .navy-header { background: #0f172a; color: white; }
    </style>
</head>
<body class="bg-gray-50">

    <div class="navy-header p-6 mb-8">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black tracking-tight">Admin Dashboard</h1>
                <p class="text-blue-300 text-xs font-bold uppercase tracking-widest mt-1">Manage Incoming Orders</p>
            </div>
            <button onclick="location.reload()" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-xs font-bold transition">
                <i class="fa-solid fa-rotate mr-2"></i> Refresh Orders
            </button>
        </div>
    </div>

    <div class="max-w-6xl mx-auto px-4 pb-20">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-6 rounded-3xl border border-blue-100 shadow-sm">
                <p class="text-gray-400 text-[10px] font-black uppercase tracking-widest">Total Orders</p>
                <h2 id="totalCount" class="text-3xl font-black text-blue-900 mt-1">0</h2>
            </div>
            <div class="bg-white p-6 rounded-3xl border border-yellow-100 shadow-sm">
                <p class="text-gray-400 text-[10px] font-black uppercase tracking-widest">Pending</p>
                <h2 id="pendingCount" class="text-3xl font-black text-yellow-600 mt-1">0</h2>
            </div>
            <div class="bg-white p-6 rounded-3xl border border-green-100 shadow-sm">
                <p class="text-gray-400 text-[10px] font-black uppercase tracking-widest">Completed</p>
                <h2 id="completedCount" class="text-3xl font-black text-green-600 mt-1">0</h2>
            </div>
        </div>

        <div id="adminOrdersList" class="space-y-6">
            <div id="loader" class="text-center py-20">
                <i class="fa-solid fa-spinner animate-spin text-4xl text-blue-800"></i>
                <p class="mt-4 font-bold text-gray-400 text-sm">Fetching Customer Details...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, updateDoc, doc, orderBy, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDfTmfa-rjdOOKaKfkiZm5re7F4deVDGf4",
            authDomain: "shopping-hub-32e5d.firebaseapp.com",
            projectId: "shopping-hub-32e5d",
            storageBucket: "shopping-hub-32e5d.firebasestorage.app",
            messagingSenderId: "905516678846",
            appId: "1:905516678846:web:602146999a96f6a79928ef"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function fetchOrders() {
            const list = document.getElementById('adminOrdersList');
            const loader = document.getElementById('loader');
            
            try {
                const q = query(collection(db, "orders"), orderBy("orderDate", "desc"));
                const snapshot = await getDocs(q);
                
                list.innerHTML = '';
                let total = 0, pending = 0, completed = 0;

                snapshot.forEach((orderDoc) => {
                    const data = orderDoc.data();
                    const id = orderDoc.id;
                    total++;
                    if(data.status === 'Pending') pending++;
                    if(data.status === 'Delivered') completed++;

                    const addressString = `${data.houseNo}, ${data.roadArea}, ${data.city}, ${data.state} - ${data.pincode}`;

                    const cardHTML = `
                        <div class="admin-card">
                            <div class="p-6 md:flex justify-between items-start gap-8">
                                <div class="flex-1">
                                    <div class="flex items-center gap-3 mb-4">
                                        <span class="bg-blue-100 text-blue-700 text-[10px] font-black px-3 py-1 rounded-full uppercase">Order #${id.substring(0,6)}</span>
                                        <span class="text-gray-400 text-xs">${data.orderDate ? new Date(data.orderDate.seconds*1000).toLocaleString() : ''}</span>
                                    </div>
                                    <h3 class="text-xl font-black text-gray-900 mb-1">${data.customerName}</h3>
                                    <p class="text-blue-600 font-bold mb-4"><i class="fa-solid fa-phone mr-2"></i>${data.phone}</p>
                                    
                                    <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100 mb-4">
                                        <p class="text-[10px] font-black text-gray-400 uppercase mb-2">Delivery Address (Copy to Meesho)</p>
                                        <p id="addr-${id}" class="text-sm font-medium text-gray-700 leading-relaxed">${addressString}</p>
                                        <button onclick="navigator.clipboard.writeText('${addressString}')" class="copy-btn mt-3">
                                            <i class="fa-solid fa-copy mr-1"></i> Copy Address
                                        </button>
                                    </div>

                                    <div class="flex items-center gap-4">
                                        <img src="${data.image}" class="w-12 h-12 rounded-lg object-cover border border-gray-200">
                                        <div>
                                            <p class="text-xs font-bold text-gray-800">${data.productName}</p>
                                            <p class="text-xs font-black text-green-600">Price: ₹${data.price} (COD)</p>
                                        </div>
                                    </div>
                                </div>

                                <div class="mt-6 md:mt-0 md:text-right border-t md:border-t-0 pt-6 md:pt-0">
                                    <p class="text-[10px] font-black text-gray-400 uppercase mb-2">Update Order Status</p>
                                    <select onchange="updateStatus('${id}', this.value)" class="status-select ${getStatusColor(data.status)}">
                                        <option value="Pending" ${data.status === 'Pending' ? 'selected' : ''}>Pending</option>
                                        <option value="Shipped" ${data.status === 'Shipped' ? 'selected' : ''}>Shipped</option>
                                        <option value="Delivered" ${data.status === 'Delivered' ? 'selected' : ''}>Delivered</option>
                                        <option value="Cancelled" ${data.status === 'Cancelled' ? 'selected' : ''}>Cancelled</option>
                                    </select>
                                    <p class="text-[9px] text-gray-400 mt-4 italic">Customer will see this update <br> on their "My Orders" page.</p>
                                </div>
                            </div>
                        </div>
                    `;
                    list.innerHTML += cardHTML;
                });

                document.getElementById('totalCount').innerText = total;
                document.getElementById('pendingCount').innerText = pending;
                document.getElementById('completedCount').innerText = completed;

            } catch (err) {
                console.error(err);
                list.innerHTML = `<p class="text-red-500 font-bold">Error loading orders: ${err.message}</p>`;
            }
        }

        window.updateStatus = async (orderId, newStatus) => {
            const orderRef = doc(db, "orders", orderId);
            try {
                await updateDoc(orderRef, { status: newStatus });
                alert("Status Updated to " + newStatus);
            } catch (err) {
                alert("Update Failed: " + err.message);
            }
        }

        function getStatusColor(status) {
            if(status === 'Pending') return 'bg-yellow-50 text-yellow-700 border-yellow-200';
            if(status === 'Shipped') return 'bg-blue-50 text-blue-700 border-blue-200';
            if(status === 'Delivered') return 'bg-green-50 text-green-700 border-green-200';
            return 'bg-gray-50 text-gray-700';
        }

        fetchOrders();
    </script>
</body>
</html>
