<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | Online Shopping Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #fdfbf7; 
            color: #1a1a1a;
        }

        .order-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 24px;
            border: 1px solid rgba(0,0,0,0.04);
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            margin-bottom: 20px;
        }

        /* Status Timeline */
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #e5e7eb;
            position: relative;
            z-index: 10;
        }

        .status-line {
            height: 3px;
            background: #e5e7eb;
            flex-grow: 1;
            margin: 0 -2px;
        }

        .active-dot { background: #1e40af; box-shadow: 0 0 10px rgba(30, 64, 175, 0.4); }
        .active-line { background: #1e40af; }

        .chat-btn {
            background: #1e40af;
            color: white;
            padding: 12px 24px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .chat-btn:hover { background: #1e3a8a; transform: translateY(-2px); }
    </style>
</head>
<body class="p-4">

    <div class="max-w-3xl mx-auto">
        <div class="flex items-center justify-between mb-8 pt-4">
            <h1 class="text-2xl font-black text-blue-900 tracking-tighter">MY ORDERS</h1>
            <a href="chat-support.html" class="chat-btn shadow-lg shadow-blue-100">
                <i class="fa-solid fa-headset text-lg"></i>
                Support
            </a>
        </div>

        <div id="ordersContainer" class="space-y-4">
            <div id="loading" class="text-center py-20">
                <i class="fa-solid fa-circle-notch animate-spin text-3xl text-blue-800"></i>
                <p class="text-xs font-bold text-gray-400 mt-4 uppercase tracking-widest">Fetching Orders...</p>
            </div>
        </div>

        <div id="noOrders" class="hidden text-center py-20 bg-white rounded-3xl border border-dashed border-gray-200">
            <i class="fa-solid fa-box-open text-5xl text-gray-200 mb-4"></i>
            <h3 class="text-lg font-bold text-gray-400 tracking-tight">You haven't ordered anything yet.</h3>
            <a href="index.html" class="inline-block mt-4 text-blue-600 font-black text-xs uppercase border-b-2 border-blue-600 pb-1">Start Shopping</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDfTmfa-rjdOOKaKfkiZm5re7F4deVDGf4",
            authDomain: "shopping-hub-32e5d.firebaseapp.com",
            projectId: "shopping-hub-32e5d",
            storageBucket: "shopping-hub-32e5d.firebasestorage.app",
            messagingSenderId: "905516678846",
            appId: "1:905516678846:web:602146999a96f6a79928ef"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loadOrders(user.email);
            } else {
                window.location.href = "login.html";
            }
        });

        async function loadOrders(email) {
            const container = document.getElementById('ordersContainer');
            const noOrders = document.getElementById('noOrders');
            const loading = document.getElementById('loading');

            try {
                // IMPORTANT: Simple query first (Avoids Index errors)
                const q = query(collection(db, "orders"), where("userEmail", "==", email));
                const querySnapshot = await getDocs(q);

                loading.style.display = 'none';

                if (querySnapshot.empty) {
                    noOrders.classList.remove('hidden');
                    return;
                }

                // Sort orders locally to prevent Firebase index requirement
                const orders = [];
                querySnapshot.forEach(doc => orders.push({ id: doc.id, ...doc.data() }));
                orders.sort((a, b) => (b.orderDate?.seconds || 0) - (a.orderDate?.seconds || 0));

                orders.forEach(order => {
                    const status = order.status || "Pending";
                    const orderDate = order.orderDate ? new Date(order.orderDate.seconds * 1000).toLocaleDateString() : 'Recent';
                    
                    const card = `
                        <div class="order-card">
                            <div class="flex justify-between items-start mb-6">
                                <div class="flex items-center gap-4">
                                    <div class="w-14 h-14 bg-gray-50 rounded-xl overflow-hidden border border-gray-100">
                                        <img src="${order.image || 'https://via.placeholder.com/150'}" class="w-full h-full object-cover">
                                    </div>
                                    <div>
                                        <h3 class="font-bold text-gray-900 leading-tight">${order.productName || 'Product'}</h3>
                                        <p class="text-blue-600 font-black text-xs mt-1 uppercase tracking-wider">₹${order.price || '0'}</p>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <p class="text-[10px] font-bold text-gray-400 uppercase">ID: #${order.id.substring(0,6)}</p>
                                    <p class="text-[10px] font-medium text-gray-500 uppercase mt-1">${orderDate}</p>
                                </div>
                            </div>

                            <div class="px-2 mb-6">
                                <div class="flex items-center">
                                    <div class="status-dot active-dot"></div>
                                    <div class="status-line ${status === 'Shipped' || status === 'Delivered' ? 'active-line' : ''}"></div>
                                    <div class="status-dot ${status === 'Shipped' || status === 'Delivered' ? 'active-dot' : ''}"></div>
                                    <div class="status-line ${status === 'Delivered' ? 'active-line' : ''}"></div>
                                    <div class="status-dot ${status === 'Delivered' ? 'active-dot' : ''}"></div>
                                </div>
                                <div class="flex justify-between mt-3 text-[9px] font-black uppercase tracking-tighter text-gray-400">
                                    <span class="text-blue-800">Received</span>
                                    <span class="${status === 'Shipped' || status === 'Delivered' ? 'text-blue-800' : ''}">Shipped</span>
                                    <span class="${status === 'Delivered' ? 'text-blue-800' : ''}">Delivered</span>
                                </div>
                            </div>

                            <div class="bg-blue-50/50 rounded-xl p-3 flex items-center justify-between">
                                <div class="flex items-center gap-3">
                                    <i class="fa-solid fa-truck-fast text-blue-800 text-sm"></i>
                                    <span class="text-[11px] font-bold text-gray-700">Estimated delivery: 5-10 Days</span>
                                </div>
                                <a href="chat-support.html" class="text-[10px] font-black text-blue-900 border-b border-blue-900">NEED HELP?</a>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });

            } catch (err) {
                console.error(err);
                container.innerHTML = `<p class="text-red-500 text-center text-xs">Error loading orders: ${err.message}</p>`;
            }
        }
    </script>
</body>
</html>
